<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Music Player</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top, rgba(155, 103, 224, 0.18), transparent 30%), #090909;
            color: #fff;
            transition: opacity 0.4s ease;
        }
        body.fade-out {
            opacity: 0;
        }
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .login-container {
            background: rgba(18, 18, 18, 0.95);
            padding: 24px 28px;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            width: 300px;
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeInScale 0.6s ease-out forwards;
        }
        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        h2 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 0;
            background: linear-gradient(135deg, #9b67e0 0%, #c5a3ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        input, button {
            width: 100%;
            max-width: 260px;
            padding: 12px 14px;
        }
        input {
            margin: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.04);
            color: #fff;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: rgba(155, 103, 224, 0.85);
            background-color: rgba(255, 255, 255, 0.08);
        }
        button {
            margin-top: 6px;
            border-radius: 14px;
            background: linear-gradient(135deg, #a64ce2 0%, #8b70ff 45%, #d6b4ff 100%);
            color: #f7f0ff;
            font-weight: 800;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 18px 40px rgba(140, 92, 255, 0.22);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 48px rgba(140, 92, 255, 0.3);
            background: linear-gradient(135deg, #9c4ee3 0%, #7e63ff 45%, #cfa9ff 100%);
        }
        input::placeholder {
            color: #b3b3b3;
        }
        .error {
            color: #ff6b6b;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Nome de usuário" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="error" class="error"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error');
            const body = document.body;

            // Validação simples
            if (username === '' || password.length < 6) {
                errorMsg.textContent = 'Nome de usuário obrigatório e senha deve ter pelo menos 6 caracteres.';
            } else {
                body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 400);
            }
        });
    </script>
</body>
</html>
